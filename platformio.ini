[platformio]
default_envs = mt6701

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^6.21.5
  askuric/Simple FOC@2.2.3
  bogde/HX711@^0.7.5
  fastled/FastLED@^3.7.0
build_flags =
  -D VP_FIRMWARE_VERSION=\"fw-0.1.0\"
  -D VP_DEVICE_ID=\"volumepad-001\"
  -D VP_PROTOCOL_VERSION=\"1\"
  -D VP_SUPPORTS_DISPLAY=1
  -D VP_SUPPORTS_LED_METER=1
  -D VP_MAX_PACKET_SIZE=1024
  -D VP_MAX_FRAME_RATE_HZ=60
  -D VP_PIN_UL=35
  -D VP_PIN_UH=36
  -D VP_PIN_VL=37
  -D VP_PIN_VH=38
  -D VP_PIN_WL=39
  -D VP_PIN_WH=40
  -D VP_PIN_DIAG=15
  -D VP_PIN_I2C_SDA=20
  -D VP_PIN_I2C_SCL=21
  -D VP_PIN_SPI_SCK=12
  -D VP_PIN_SPI_MISO=13
  -D VP_PIN_SPI_MOSI=11
  -D VP_PIN_SENSOR_CS=10
  -D VP_PIN_HX711_DOUT=4
  -D VP_PIN_HX711_SCK=5
  -D VP_PIN_KEY_1=6
  -D VP_PIN_KEY_2=7
  -D VP_PIN_KEY_3=8
  -D VP_PIN_LED_DATA=9
  -D VP_PIN_TFT_CS=14
  -D VP_PIN_TFT_DC=16
  -D VP_PIN_TFT_RST=17
  -D VP_PIN_TFT_BL=18
  -D VP_MOTOR_POLE_PAIRS=7
  -D VP_MOTOR_SUPPLY_VOLTAGE=5.0f
  -D VP_MOTOR_VOLTAGE_LIMIT=4.0f
  -D VP_MOTOR_PWM_FREQUENCY=25000
  -D VP_DETENT_COUNT_DEFAULT=24
  -D VP_DETENT_STRENGTH_DEFAULT=0.65f
  -D VP_SNAP_STRENGTH_DEFAULT=0.4f
  -D VP_LED_BRIGHTNESS_DEFAULT=0.8f
  -D VP_DISPLAY_BRIGHTNESS_DEFAULT=0.8f
  -D VP_BUTTON_LONG_PRESS_DEFAULT=450
  -D VP_KEY_LED_COUNT=3
  -D VP_RING_LED_COUNT=27
  -D VP_ENDSTOP_MIN_POS=-1.5f
  -D VP_ENDSTOP_MAX_POS=1.5f
  -D VP_ENDSTOP_MIN_STRENGTH=5.0f
  -D VP_ENDSTOP_MAX_STRENGTH=2.0f
  -D VP_ENDSTOP_MAX_VOLTAGE=5.0f
  -D VP_DETENT_STRENGTH_MAX_V_PER_RAD=2.0f
  -D VP_SNAP_STRENGTH_MAX_V_PER_RAD=2.0f
  -D VP_SNAP_WINDOW_RAD=0.25f
  -D VP_STRAIN_PRESS_THRESHOLD=6000.0f
  -D VP_STRAIN_RELEASE_HYSTERESIS=2000.0f
  -D VP_STRAIN_FORCE_SCALE=1.0f
  -D VP_STRAIN_INVERT_SIGN=1
  -D VP_STRAIN_BASELINE_ALPHA=0.0025f
  -D VP_CLICK_PULSE_VOLTAGE=1.2f
  -D VP_CLICK_PULSE_MS=34
  -D VP_MT6701_SPI_HZ=1000000
  -D VP_MT6701_SPI_MODE=0
  -D VP_MT6701_BITS=14
  -D VP_MT6701_BIT_SHIFT=0
  -D VP_AS5600_I2C_ADDR=0x36
  -D VP_AS5600_BITS=12

[env:mt6701]
build_flags =
  ${env.build_flags}
  -D VP_SENSOR_BACKEND_MT6701=1

[env:as5600]
build_flags =
  ${env.build_flags}
  -D VP_SENSOR_BACKEND_AS5600=1

[env:as6500]
build_flags =
  ${env.build_flags}
  -D VP_SENSOR_BACKEND_AS6500=1
